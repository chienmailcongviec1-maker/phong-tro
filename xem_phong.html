<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh Sách Phòng</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f7f5;
  --white: #ffffff;
  --border: #e8e8e4;
  --text: #1a1a18;
  --text2: #6b6b68;
  --text3: #9b9b98;
  --accent: #2563eb;
  --accent-bg: #eff6ff;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --green-border: #bbf7d0;
  --radius: 12px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--white); border-bottom: 1px solid var(--border); padding: 16px 20px; text-align: center; }
.header h1 { font-size: 18px; font-weight: 600; }
.header p { font-size: 13px; color: var(--text2); margin-top: 4px; }

.container { max-width: 680px; margin: 0 auto; padding: 20px 16px; }

.loading { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 15px; }
.loading .spinner { font-size: 32px; display: block; margin-bottom: 12px; animation: spin 1.5s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.room-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }

/* Image carousel */
.img-carousel { position: relative; background: #f0f0ee; }
.img-carousel img { width: 100%; height: 240px; object-fit: cover; display: block; }
.img-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); transition: background 0.2s; }
.dot.active { background: #fff; }
.img-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.3); color: #fff; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.img-nav.prev { left: 8px; }
.img-nav.next { right: 8px; }
.no-img { height: 160px; display: flex; align-items: center; justify-content: center; font-size: 40px; background: #f5f5f3; }

/* Card content */
.card-body { padding: 16px; }
.card-price { font-size: 22px; font-weight: 700; color: var(--text); }
.card-addr { font-size: 14px; color: var(--text2); margin-top: 4px; line-height: 1.5; }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
.tag-green { background: var(--green-bg); color: var(--green); }
.tag-blue { background: var(--accent-bg); color: var(--accent); }
.tag-gray { background: #f5f5f3; color: var(--text3); }

.divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

.info-row { display: flex; gap: 8px; font-size: 13px; margin-bottom: 8px; line-height: 1.6; }
.info-label { color: var(--text3); min-width: 90px; flex-shrink: 0; }
.info-val { color: var(--text2); }

.contact-btn { display: block; width: 100%; margin-top: 14px; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; font-family: inherit; text-decoration: none; }

.count-bar { font-size: 13px; color: var(--text3); margin-bottom: 16px; text-align: center; }

.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }

footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text3); }
</style>
</head>
<body>

<div class="header">
  <h1>🏠 Danh Sách Phòng</h1>
  <p id="headerSub">Đang tải phòng...</p>
</div>

<div class="container">
  <div id="content">
    <div class="loading"><span class="spinner">⏳</span>Đang tải danh sách phòng...</div>
  </div>
</div>

<footer>Liên hệ trực tiếp để xem phòng và biết địa chỉ chính xác</footer>

<script>
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { rooms: p.get('rooms'), api: p.get('api') };
}

async function loadRooms() {
  const { rooms, api } = getParams();
  if (!rooms || !api) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">❌</div>Link không hợp lệ</div>';
    return;
  }

  try {
    const res = await fetch(`${decodeURIComponent(api)}?action=getByIds&ids=${rooms}`);
    const data = await res.json();
    renderRooms(data.rooms || []);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Lỗi tải dữ liệu. Vui lòng thử lại.</div>';
  }
}

function renderRooms(rooms) {
  document.getElementById('headerSub').textContent = `${rooms.length} phòng được giới thiệu`;

  if (!rooms.length) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">🏚</div>Không có phòng nào để hiển thị.</div>';
    return;
  }

  document.getElementById('content').innerHTML =
    `<div class="count-bar">${rooms.length} phòng phù hợp với bạn</div>` +
    rooms.map((r, idx) => roomCard(r, idx)).join('');
}

function shortenAddr(addr) {
  // Chỉ hiện tên đường, không hiện số nhà
  if (!addr) return '—';
  const parts = addr.split(',');
  return parts.slice(Math.max(0, parts.length - 2)).join(',').trim();
}

function roomCard(r, idx) {
  const imgs = (r['Ảnh'] || '').split(',').filter(Boolean);
  let imgHtml = '';
  if (imgs.length === 0) {
    imgHtml = '<div class="no-img">🏠</div>';
  } else if (imgs.length === 1) {
    imgHtml = `<div class="img-carousel"><img src="${imgs[0].trim()}" onerror="this.parentElement.innerHTML='<div class=no-img>🏠</div>'"></div>`;
  } else {
    const dotsHtml = imgs.map((_, i) => `<div class="dot ${i===0?'active':''}" id="dot-${idx}-${i}"></div>`).join('');
    const imgsHtml = imgs.map((url, i) => `<img src="${url.trim()}" style="display:${i===0?'block':'none'}" id="img-${idx}-${i}" onerror="this.style.display='none'">`).join('');
    imgHtml = `<div class="img-carousel" id="carousel-${idx}">
      ${imgsHtml}
      <button class="img-nav prev" onclick="prevImg(${idx},${imgs.length})">‹</button>
      <button class="img-nav next" onclick="nextImg(${idx},${imgs.length})">›</button>
      <div class="img-dots">${dotsHtml}</div>
    </div>`;
  }

  const tags = [];
  if (!r['Bao trống'] || r['Bao trống'] === 'Đang trống') tags.push(`<span class="tag tag-green">🟢 Còn trống</span>`);
  else tags.push(`<span class="tag tag-gray">📅 ${r['Bao trống']}</span>`);
  if (r['Thang máy'] === 'Có') tags.push(`<span class="tag tag-blue">🛗 Thang máy</span>`);
  if (r['Xe điện'] === 'Có') tags.push(`<span class="tag tag-green">⚡ Để xe điện</span>`);
  if (r['Nuôi pet'] === 'Có') tags.push(`<span class="tag tag-green">🐾 Nuôi thú cưng</span>`);

  const shortAddr = shortenAddr(r['Địa chỉ']);
  const quan = r['Quận'] ? ` · ${r['Quận']}` : '';

  return `<div class="room-card">
    ${imgHtml}
    <div class="card-body">
      <div class="card-price">${r['Giá'] || 'Giá thỏa thuận'}</div>
      <div class="card-addr">📍 ${shortAddr}${quan}</div>
      <div class="card-tags">${tags.join('')}</div>
      <div class="divider"></div>
      ${r['Tầng'] ? `<div class="info-row"><span class="info-label">Tầng</span><span class="info-val">${r['Tầng']}</span></div>` : ''}
      ${r['Nội thất'] ? `<div class="info-row"><span class="info-label">Nội thất</span><span class="info-val">${r['Nội thất']}</span></div>` : ''}
      ${r['Phí dịch vụ'] ? `<div class="info-row"><span class="info-label">Phí dịch vụ</span><span class="info-val">${r['Phí dịch vụ']}</span></div>` : ''}
      <a class="contact-btn" href="tel:">📞 Liên hệ xem phòng</a>
    </div>
  </div>`;
}

let carouselState = {};
function nextImg(idx, total) {
  carouselState[idx] = carouselState[idx] || 0;
  const cur = carouselState[idx];
  const next = (cur + 1) % total;
  switchImg(idx, cur, next, total);
}
function prevImg(idx, total) {
  carouselState[idx] = carouselState[idx] || 0;
  const cur = carouselState[idx];
  const prev = (cur - 1 + total) % total;
  switchImg(idx, cur, prev, total);
}
function switchImg(idx, from, to, total) {
  const fromImg = document.getElementById(`img-${idx}-${from}`);
  const toImg = document.getElementById(`img-${idx}-${to}`);
  const fromDot = document.getElementById(`dot-${idx}-${from}`);
  const toDot = document.getElementById(`dot-${idx}-${to}`);
  if(fromImg) fromImg.style.display = 'none';
  if(toImg) toImg.style.display = 'block';
  if(fromDot) fromDot.classList.remove('active');
  if(toDot) toDot.classList.add('active');
  carouselState[idx] = to;
}

loadRooms();
</script>
</body>
</html>
